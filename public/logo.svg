<!-- Calibre Logo — Symbol + Logotype -->
<!-- Symbol: crosshair/calibration target — evokes ATS scoring precision -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 40" fill="none">
  <!-- Symbol: 32x32 calibration mark -->
  <g transform="translate(4, 4)">
    <!-- Outer ring -->
    <circle cx="16" cy="16" r="14" stroke="#1A73E8" stroke-width="2" fill="none"/>
    <!-- Inner ring -->
    <circle cx="16" cy="16" r="6" stroke="#1A73E8" stroke-width="2" fill="none"/>
    <!-- Crosshair lines -->
    <line x1="16" y1="0" x2="16" y2="8" stroke="#1A73E8" stroke-width="2"/>
    <line x1="16" y1="24" x2="16" y2="32" stroke="#1A73E8" stroke-width="2"/>
    <line x1="0" y1="16" x2="8" y2="16" stroke="#1A73E8" stroke-width="2"/>
    <line x1="24" y1="16" x2="32" y2="16" stroke="#1A73E8" stroke-width="2"/>
    <!-- Center dot -->
    <circle cx="16" cy="16" r="2" fill="#1A73E8"/>
  </g>
  <!-- Logotype: "Calibre" in mono -->
  <text x="48" y="28" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace" font-size="22" font-weight="700" fill="#202124" letter-spacing="-0.5">Calibre</text>
</svg>
